version: '3.8'

services:
  db:
    image: postgres:16
    container_name: elegante_postgres_db
    restart: always
    environment:
      POSTGRES_USER: amir
      POSTGRES_PASSWORD: amir123
      POSTGRES_DB: elegante
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    container_name: elegante_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://amir:amir123@db:5432/elegante
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - db
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: